# Build a signed iOS .ipa for TestFlight on GitHub's macOS runner.
# Blueprint §30 Phase 0 deliverable: "TestFlight build proving that one shot feels excellent."
#
# This runs on macOS (GitHub-hosted), which CAN compile iOS — unlike a Windows dev box.
# It produces an .ipa artifact you can upload to TestFlight via Transporter or `xcrun altool`.
#
# Secrets to set in repo Settings → Secrets and variables → Actions:
#   BUILD_CERTIFICATE_BASE64  — base64 of your iOS Distribution .p12
#   P12_PASSWORD              — password for that .p12
#   BUILD_PROVISION_PROFILE_BASE64 — base64 of your provisioning profile (.mobileprovision)
#   KEYCHAIN_PASSWORD         — any random string (used to create a temp keychain)
#
# See: https://docs.github.com/en/actions/deployment/deploying-xcode-applications/installing-an-apple-certificate-on-macos-runners-for-xcode-development
name: iOS Build (TestFlight)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build .ipa
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync web assets into native project
        run: npx cap sync ios

      - name: Validate iOS project
        run: node test/validate-ios.cjs

      # ---- Install signing certificate + provisioning profile ----
      - name: Create keychain & import certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: scripts/setup-signing.sh
        shell: bash

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Build app archive
        id: archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            ${{ env.BUILD_CERTIFICATE_BASE64 != '' && 'CODE_SIGN_STYLE=Manual' || 'CODE_SIGNING_ALLOWED=NO' }} \
            archive | xcpretty
          # Always package the compiled .xcarchive so the binary is recoverable
          # even without signing keys. (Blueprint §30: the archive IS the app.)
          cd build && zip -qry PULLPOP-xcarchive.zip App.xcarchive && cd ..
          ls -la build/PULLPOP-xcarchive.zip

      - name: Export signed .ipa
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          EXPORT_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          if [ -z "$EXPORT_PLIST" ]; then
            echo "EXPORT_OPTIONS_PLIST secret not set; skipping signed export"
            exit 0
          fi
          echo "$EXPORT_PLIST" | base64 --decode > build/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa \
            | xcpretty

      - name: Build unsigned .ipa (no signing keys)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 == '' }}
        run: |
          # Package the compiled app into an .ipa container without signing, so the
          # compiled binary is downloadable even without an Apple Developer cert.
          # This .ipa installs via sideloading tools; TestFlight needs the signed path.
          mkdir -p build/ipa/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/ipa/Payload/
          cd build/ipa && zip -qry ../PULLPOP-unsigned.ipa Payload && cd ../..
          echo "✓ Unsigned .ipa built:" && ls -la build/PULLPOP-unsigned.ipa

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PULLPOP-iOS
          path: |
            build/PULLPOP-unsigned.ipa
            build/ipa/*.ipa
            build/PULLPOP-xcarchive.zip
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ env.APP_STORE_CONNECT_API_KEY != '' }}
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          IPA=$(ls build/ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then echo "No .ipa to upload"; exit 0; fi
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > /tmp/AuthKey_8X2K4P9K2H.p8
          xcrun altool --upload-app --type ios -f "$IPA" \
            --apiKey 8X2K4P9K2H --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
